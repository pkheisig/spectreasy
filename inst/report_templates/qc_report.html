<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{REPORT_TITLE}}</title>
  <style>
    :root { --ink:#17231f; --muted:#62716b; --paper:#f5f2e9; --card:#fffdf7; --line:#d8d6ca; --forest:#174f43; --mint:#83b9a5; --coral:#d96f51; --amber:#b87917; --red:#a33a35; --shadow:0 18px 55px rgba(34,50,43,.10); }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { margin:0; color:var(--ink); background:var(--paper); font:15px/1.55 Georgia,"Times New Roman",serif; }
    a { color:var(--forest); }
    .shell { display:grid; grid-template-columns:260px minmax(0,1fr); min-height:100vh; }
    aside { position:sticky; top:0; height:100vh; overflow:auto; padding:28px 22px; color:#eef7f2; background:var(--forest); }
    .brand { font:700 21px/1.1 ui-monospace,SFMono-Regular,Menlo,monospace; letter-spacing:.02em; }
    .brand span { display:block; margin-top:8px; color:#b8d6ca; font:11px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace; text-transform:uppercase; letter-spacing:.14em; }
    nav { margin-top:32px; }
    nav a { display:block; padding:8px 10px; color:#d7e8e1; border-left:2px solid transparent; text-decoration:none; font:12px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace; }
    nav a:hover { color:white; border-color:var(--coral); background:rgba(255,255,255,.06); }
    main { min-width:0; padding:42px clamp(24px,5vw,76px) 80px; }
    header { position:relative; overflow:hidden; padding:36px; color:white; background:#203b34; box-shadow:var(--shadow); }
    header:after { content:""; position:absolute; width:260px; height:260px; right:-80px; top:-120px; border:44px solid rgba(131,185,165,.28); border-radius:50%; }
    .kicker { font:700 11px/1 ui-monospace,SFMono-Regular,Menlo,monospace; letter-spacing:.15em; text-transform:uppercase; color:#a9d4c3; }
    h1 { max-width:820px; margin:12px 0 8px; font-size:clamp(32px,5vw,58px); line-height:1.02; font-weight:500; }
    header p { max-width:780px; margin:0; color:#d5e5df; }
    .summary-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1px; margin-top:28px; background:rgba(255,255,255,.16); }
    .summary-grid div { min-width:0; padding:14px; background:rgba(20,57,48,.86); }
    .summary-grid small { display:block; color:#9fc6b7; font:10px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace; text-transform:uppercase; letter-spacing:.08em; }
    .summary-grid strong { display:block; margin-top:5px; overflow-wrap:anywhere; font-size:14px; font-weight:500; }
    section { margin-top:28px; padding:26px; border:1px solid var(--line); background:var(--card); box-shadow:0 8px 28px rgba(37,47,42,.045); }
    section > h2 { margin:0 0 18px; padding-bottom:12px; border-bottom:1px solid var(--line); font-size:25px; font-weight:500; }
    section > h2 button { all:inherit; width:100%; cursor:pointer; }
    section > h2 button:after { content:"−"; float:right; color:var(--coral); font:20px ui-monospace,monospace; }
    section.collapsed > h2 { margin-bottom:0; padding-bottom:0; border:0; }
    section.collapsed > h2 button:after { content:"+"; }
    section.collapsed .section-body { display:none; }
    h3 { margin:24px 0 10px; color:var(--forest); font-size:17px; }
    .badges { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 18px; }
    .badge { display:inline-flex; padding:5px 9px; border-radius:999px; color:#fff; background:var(--forest); font:700 10px/1 ui-monospace,SFMono-Regular,Menlo,monospace; text-transform:uppercase; letter-spacing:.06em; }
    .badge.warning,.badge.stale,.badge.adjusted { background:var(--amber); }
    .badge.failed,.badge.missing { background:var(--red); }
    .badge.synthetic { background:#5863a7; }
    .table-wrap,.plot-wrap { max-width:100%; overflow:auto; border:1px solid var(--line); background:#fff; }
    table { width:100%; border-collapse:collapse; font:12px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace; }
    th { position:sticky; top:0; z-index:1; color:white; background:#315f54; text-align:left; }
    th,td { padding:9px 11px; border-bottom:1px solid #e5e3d9; vertical-align:top; white-space:nowrap; }
    td.missing { color:var(--red); background:#fff0ed; font-weight:700; }
    .plot-wrap { margin:12px 0; padding:10px; }
    .plot-wrap img { display:block; max-width:none; width:auto; min-width:min(100%,760px); max-height:900px; margin:auto; }
    .note { padding:13px 15px; border-left:4px solid var(--mint); background:#edf5f1; color:#43534d; }
    .warning-list { padding-left:22px; }
    .paths { overflow-wrap:anywhere; font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; }
    pre { overflow:auto; padding:16px; color:#e7f0ec; background:#23322d; font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; }
    footer { margin-top:34px; color:var(--muted); font:11px ui-monospace,SFMono-Regular,Menlo,monospace; }
    @media (max-width:850px) { .shell{display:block} aside{position:relative;height:auto} nav{columns:2} main{padding:22px 14px 50px} header,section{padding:20px} }
    @media print { aside{display:none}.shell{display:block}main{padding:0}section{break-inside:avoid;box-shadow:none}header{box-shadow:none} }
  </style>
</head>
<body>
  <div class="shell">
    <aside><div class="brand">spectreasy<span>scientific QC report</span></div><nav>{{REPORT_TOC}}</nav></aside>
    <main>
      {{REPORT_HEADER}}
      {{REPORT_BODY}}
      <footer>Generated locally by Spectreasy. This report is self-contained and does not require the GUI or an internet connection.</footer>
    </main>
  </div>
  <script>document.querySelectorAll('section > h2 button').forEach(function(button){button.addEventListener('click',function(){button.closest('section').classList.toggle('collapsed')})})</script>
</body>
</html>
