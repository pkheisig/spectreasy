<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{REPORT_TITLE}}</title>
  <style>
    :root { --ink:#251d19; --muted:#75665e; --paper:#faf5ef; --card:#fffefa; --line:#e4d9ce; --accent:#f28b54; --accent-dark:#b75525; --accent-soft:#ffd8c3; --accent-rgb:242,139,84; --sidebar:#2c2826; --amber:#c27a13; --red:#aa382f; --shadow:0 18px 55px rgba(71,43,28,.10); }
    body.report-control { --ink:#18232e; --muted:#657383; --paper:#f2f7fb; --card:#fcfeff; --line:#d6e2ed; --accent:#70afe8; --accent-dark:#3379b8; --accent-soft:#d0e8fb; --accent-rgb:112,175,232; --sidebar:#252b31; --shadow:0 18px 55px rgba(35,72,106,.10); }
    * { box-sizing:border-box; }
    html { scroll-behavior:auto; }
    body { margin:0; color:var(--ink); background:var(--paper); font:15px/1.55 Georgia,"Times New Roman",serif; }
    a { color:var(--accent-dark); }
    .shell { display:grid; grid-template-columns:156px minmax(0,1fr); min-height:100vh; transition:grid-template-columns .22s ease; }
    .shell.sidebar-collapsed { grid-template-columns:46px minmax(0,1fr); }
    aside { position:sticky; top:0; height:100vh; overflow:hidden auto; padding:20px 12px; color:#fff6ef; background:var(--sidebar); }
    .sidebar-toggle { display:grid; place-items:center; width:30px; height:30px; margin:0 0 20px auto; padding:0; border:1px solid rgba(255,255,255,.22); border-radius:50%; color:#fff; background:transparent; cursor:pointer; font:18px/1 ui-monospace,SFMono-Regular,Menlo,monospace; transition:background .18s,border-color .18s,transform .22s; }
    .sidebar-toggle:hover { border-color:var(--accent); background:rgba(var(--accent-rgb),.16); }
    .shell.sidebar-collapsed .sidebar-toggle { transform:rotate(180deg); }
    .brand { font:700 21px/1.1 ui-monospace,SFMono-Regular,Menlo,monospace; letter-spacing:.02em; }
    .brand span { display:block; margin-top:8px; color:var(--accent-soft); font:10px/1.4 ui-monospace,SFMono-Regular,Menlo,monospace; text-transform:uppercase; letter-spacing:.12em; }
    nav { margin-top:28px; }
    nav a { display:block; margin:2px 0; padding:7px 8px; color:#ddcfca; border-left:3px solid transparent; text-decoration:none; font:11px/1.3 ui-monospace,SFMono-Regular,Menlo,monospace; transition:color .15s,background .15s,border-color .15s; }
    nav a:hover,nav a.active { color:white; border-color:var(--accent); background:rgba(var(--accent-rgb),.15); }
    .width-control { margin-top:28px; padding-top:18px; border-top:1px solid rgba(255,255,255,.14); }
    .width-control label { display:flex; justify-content:space-between; gap:8px; margin-bottom:9px; color:#ddcfca; font:10px/1.3 ui-monospace,SFMono-Regular,Menlo,monospace; text-transform:uppercase; letter-spacing:.07em; }
    .width-control output { color:var(--accent-soft); }
    .width-control input { width:100%; margin:0; accent-color:var(--accent); cursor:ew-resize; }
    .shell.sidebar-collapsed .brand,.shell.sidebar-collapsed nav,.shell.sidebar-collapsed .width-control { display:none; }
    main { width:var(--report-width,67%); min-width:0; padding:34px clamp(18px,3.2vw,54px) 72px; justify-self:center; transition:width .18s ease; }
    header { position:relative; overflow:hidden; padding:32px; color:white; border-top:4px solid var(--accent); background:#332722; box-shadow:var(--shadow); }
    .kicker { font:700 11px/1 ui-monospace,SFMono-Regular,Menlo,monospace; letter-spacing:.15em; text-transform:uppercase; color:var(--accent-soft); }
    h1 { max-width:820px; margin:12px 0 8px; font-size:clamp(32px,5vw,58px); line-height:1.02; font-weight:500; }
    header p { max-width:780px; margin:0; color:#eadbd3; }
    .summary-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1px; margin-top:28px; background:transparent; }
    .summary-grid div { min-width:0; padding:14px; background:rgba(255,255,255,.07); }
    .summary-grid small { display:block; color:var(--accent-soft); font:10px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace; text-transform:uppercase; letter-spacing:.08em; }
    .summary-grid strong { display:block; margin-top:5px; overflow-wrap:anywhere; font-size:14px; font-weight:500; }
    section { margin-top:28px; padding:26px; border:1px solid var(--line); background:var(--card); box-shadow:0 8px 28px rgba(37,47,42,.045); }
    section > h2 { margin:0 0 18px; padding-bottom:12px; border-bottom:1px solid var(--line); font-size:25px; font-weight:500; }
    section > h2 button { all:inherit; width:100%; cursor:pointer; }
    section > h2 button:after { content:"−"; float:right; color:var(--accent); font:20px ui-monospace,monospace; }
    section.collapsed > h2 { margin-bottom:0; padding-bottom:0; border:0; }
    section.collapsed > h2 button:after { content:"+"; }
    section.collapsed .section-body { display:none; }
    h3 { margin:24px 0 10px; color:var(--accent-dark); font-size:17px; }
    .badges { display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 18px; }
    .badge { display:inline-flex; padding:5px 9px; border-radius:999px; color:#fff; background:var(--accent); font:700 10px/1 ui-monospace,SFMono-Regular,Menlo,monospace; text-transform:uppercase; letter-spacing:.06em; }
    .badge.warning,.badge.stale,.badge.adjusted { background:var(--amber); }
    .badge.failed,.badge.missing { background:var(--red); }
    .badge.synthetic { background:#5863a7; }
    .plot-wrap { display:grid; place-items:center; max-width:100%; margin:12px 0; padding:8px; overflow:hidden; border:1px solid var(--line); background:#fff; }
    .plot-wrap img { display:block; width:auto; max-width:100%; min-width:0; max-height:78vh; height:auto; margin:auto; object-fit:contain; }
    .plot-wrap img.plot-square { width:min(100%,850px); max-height:82vh; }
    .note { padding:13px 15px; border-left:4px solid var(--accent); background:rgba(var(--accent-rgb),.10); color:var(--ink); }
    .control-review { padding:22px 0 28px; border-bottom:1px solid var(--line); }
    .control-review:last-child { padding-bottom:0; border-bottom:0; }
    .control-review > h3 { margin-top:0; font-size:20px; }
    .control-caption { margin:-3px 0 16px; color:var(--muted); font:11px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; }
    .control-plot-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    .control-plot-grid .plot-wrap { margin:0; min-height:260px; }
    .control-plot-grid .plot-wrap:last-child:nth-child(odd) { grid-column:1/-1; }
    .companion-link { display:inline-flex; align-items:center; margin-top:8px; padding:11px 14px; border:1px solid var(--accent); color:var(--accent-dark); background:rgba(var(--accent-rgb),.10); text-decoration:none; font:700 12px/1.2 ui-monospace,SFMono-Regular,Menlo,monospace; }
    .companion-link:hover { color:white; background:var(--accent-dark); }
    .companion-links { display:flex; flex-wrap:wrap; gap:10px; }
    .warning-list { padding-left:22px; }
    .paths { overflow-wrap:anywhere; font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; }
    pre { overflow:auto; padding:16px; color:#fff3ec; background:#2c2421; font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; }
    @media (max-width:850px) { .shell,.shell.sidebar-collapsed{display:block}.sidebar-toggle,.width-control{display:none}aside{position:relative;height:auto;padding:16px}.brand{font-size:18px}nav{margin-top:16px;columns:2}.shell.sidebar-collapsed .brand,.shell.sidebar-collapsed nav{display:block}main{width:100%;padding:22px 14px 50px}header,section{padding:20px}.control-plot-grid{grid-template-columns:1fr}.control-plot-grid .plot-wrap:last-child:nth-child(odd){grid-column:auto} }
    @media print { aside{display:none}.shell{display:block}main{width:100%;padding:0}section{break-inside:avoid;box-shadow:none}header{box-shadow:none} }
  </style>
</head>
<body class="{{REPORT_CLASS}}">
  <div class="shell">
    <aside><button class="sidebar-toggle" type="button" aria-label="Collapse report navigation" aria-expanded="true">‹</button><div class="brand">spectreasy<span>scientific QC report</span></div><nav>{{REPORT_TOC}}</nav><div class="width-control"><label for="report-width">Panel width <output id="report-width-value" for="report-width">67%</output></label><input id="report-width" type="range" min="60" max="100" value="67" step="1" aria-label="Report panel width percentage"></div></aside>
    <main>
      {{REPORT_HEADER}}
      {{REPORT_BODY}}
    </main>
  </div>
  <script>
    (function(){
      var shell=document.querySelector('.shell');
      var toggle=document.querySelector('.sidebar-toggle');
      var widthSlider=document.getElementById('report-width');
      var widthValue=document.getElementById('report-width-value');
      var links=Array.from(document.querySelectorAll('nav a'));
      var sections=Array.from(document.querySelectorAll('main section'));
      toggle.addEventListener('click',function(){
        var collapsed=shell.classList.toggle('sidebar-collapsed');
        toggle.setAttribute('aria-expanded',String(!collapsed));
        toggle.setAttribute('aria-label',collapsed?'Expand report navigation':'Collapse report navigation');
      });
      widthSlider.addEventListener('input',function(){
        var width=widthSlider.value+'%';
        document.documentElement.style.setProperty('--report-width',width);
        widthValue.value=width;
        widthValue.textContent=width;
      });
      document.querySelectorAll('section > h2 button').forEach(function(button){
        button.addEventListener('click',function(){button.closest('section').classList.toggle('collapsed')});
      });
      function setActive(id){links.forEach(function(link){link.classList.toggle('active',link.getAttribute('href')==='#'+id)});}
      var observer=new IntersectionObserver(function(entries){
        var visible=entries.filter(function(entry){return entry.isIntersecting}).sort(function(a,b){return Math.abs(a.boundingClientRect.top)-Math.abs(b.boundingClientRect.top)});
        if(visible.length)setActive(visible[0].target.id);
      },{rootMargin:'-18% 0px -68% 0px',threshold:[0,.1]});
      sections.forEach(function(section){observer.observe(section)});
      links.forEach(function(link){link.addEventListener('click',function(){setActive(link.getAttribute('href').slice(1))})});
      document.querySelectorAll('[data-companion]').forEach(function(link){
        var reportPath=new URLSearchParams(location.search).get('path');
        if(reportPath&&location.pathname.indexOf('/project/file')!==-1){
          var separator=Math.max(reportPath.lastIndexOf('/'),reportPath.lastIndexOf('\\\\'));
          var companionPath=(separator>=0?reportPath.slice(0,separator+1):'')+link.dataset.companion;
          link.href=location.pathname+'?path='+encodeURIComponent(companionPath);
        }
      });
      if(sections.length)setActive((location.hash||'#'+sections[0].id).slice(1));
    })();
  </script>
</body>
</html>
