name: R-CMD-check

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        r: ["release", "devel"]

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            bioc::BiocCheck
          needs: check

      - name: Run R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual")'

      - name: Run BiocCheck
        shell: Rscript {0}
        run: |
          tarball <- list.files(pattern = "^spectreasy_.*\\.tar\\.gz$", full.names = TRUE)
          if (length(tarball) == 0) {
            system("R CMD build .", intern = TRUE)
            tarball <- list.files(pattern = "^spectreasy_.*\\.tar\\.gz$", full.names = TRUE)
          }
          BiocCheck::BiocCheck(tarball[[1]], quitWithStatus = TRUE)
