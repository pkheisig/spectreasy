name: R-CMD-check

on:
  push:
    branches: [master, main, v2]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "18 4 * * 1"
  workflow_dispatch:

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-portability:
    name: Package build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: install
          cache: always

      - name: Build and install the source package
        shell: Rscript {0}
        run: |
          status <- system2(file.path(R.home("bin"), "R"), c("CMD", "build", "--no-build-vignettes", "."))
          stopifnot(identical(status, 0L))
          tarball <- list.files(pattern = "^spectreasy_.*[.]tar[.]gz$", full.names = TRUE)
          stopifnot(length(tarball) == 1L)
          status <- system2(file.path(R.home("bin"), "R"), c("CMD", "INSTALL", "--preclean", shQuote(tarball[[1]])))
          stopifnot(identical(status, 0L))
          stopifnot(nzchar(find.package("spectreasy")))

  analysis-runtime:
    name: Complete population-analysis runtime
    if: github.ref == 'refs/heads/v2' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: inst/python/requirements-analysis.lock

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools
          needs: check
          cache: always

      - name: Install and verify every analysis adapter
        shell: bash
        run: |
          set -euo pipefail
          Rscript -e 'devtools::load_all(quiet = TRUE); status <- install_analysis_dependencies(python = Sys.which("python3")); stopifnot(isTRUE(status$ready))'
          PYTHONPATH=inst/python python -m unittest discover -s tests/python -p 'test_*.py'
          Rscript -e 'devtools::load_all(quiet = TRUE); testthat::test_file("tests/testthat/test-analysis-workspace-v2.R", stop_on_failure = TRUE)'

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        r: ${{ fromJSON((github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '["release", "devel"]' || '["release"]') }}

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: inst/gui/package-lock.json

      - name: Check bundled GUI source
        shell: bash
        working-directory: inst/gui
        run: |
          set -euo pipefail
          npm ci
          npm run lint
          npm test
          npm run build

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            bioc::BiocCheck
          needs: check
          cache: always

      - name: Run R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--no-manual")'

      - name: Run BiocCheck
        shell: bash
        run: |
          set -euo pipefail

          tarball="$(
            Rscript -e '
              tarball <- list.files(pattern = "^spectreasy_.*\\.tar\\.gz$", full.names = TRUE)
              if (length(tarball) == 0) {
                system("R CMD build .", intern = TRUE)
                tarball <- list.files(pattern = "^spectreasy_.*\\.tar\\.gz$", full.names = TRUE)
              }
              cat(normalizePath(tarball[[1]], winslash = "/"))
            '
          )"

          run_bioccheck() {
            local allow_deprecated_skip="${1:-false}"
            TARBALL="$tarball" ALLOW_DEPRECATED_SKIP="$allow_deprecated_skip" Rscript - <<'EOF'
          args <- list(Sys.getenv("TARBALL"), quitWithStatus = TRUE)
          if (identical(Sys.getenv("ALLOW_DEPRECATED_SKIP"), "true")) {
            args[["no-check-deprecated"]] <- TRUE
          }
          do.call(BiocCheck::BiocCheck, args)
          EOF
          }

          for attempt in 1 2; do
            log_file="bioccheck-attempt-${attempt}.log"
            if run_bioccheck false 2>&1 | tee "$log_file"; then
              exit 0
            fi

            if ! grep -Eiq "HTTP 5[0-9][0-9]|Gateway Timeout|download failed|bfcadd\\(\\) failed|bfcrpath" "$log_file"; then
              exit 1
            fi

            if [ "$attempt" -lt 2 ]; then
              sleep $((attempt * 30))
            fi
          done

          echo "BiocCheck's deprecated-package status download kept failing; rerunning with only that remote check disabled."
          run_bioccheck true
