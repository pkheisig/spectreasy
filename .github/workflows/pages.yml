name: Deploy cockpit to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'inst/gui/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: inst/gui/package-lock.json
      - run: npm ci
        working-directory: inst/gui
      - run: npm run build
        working-directory: inst/gui
        env:
          VITE_BASE_PATH: /spectreasy/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: inst/gui/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
